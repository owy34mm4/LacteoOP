<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>LácteoOp · Pedidos</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="pedidos.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>html, body, #root { height: 100%; margin: 0; }</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../shared/domain.js"></script>
  <script type="text/babel" src="../shared/adapters/http.js"></script>
  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="OrderList.jsx"></script>
  <script type="text/babel" src="NewOrderForm.jsx"></script>
  <script type="text/babel" src="ConfirmModal.jsx"></script>

  <script type="text/babel">
    const API_URL = 'http://localhost:8000';
    const pedidoRepo = LacteoOp.adapters.http.PedidoPort(API_URL);

    function App() {
      const [orders, setOrders]     = React.useState([]);
      const [loading, setLoading]   = React.useState(true);
      const [selected, setSelected] = React.useState(null);
      const [query, setQuery]       = React.useState('');
      const [filter, setFilter]     = React.useState('all');
      const [draft, setDraft]       = React.useState(null);
      const [toast, setToast]       = React.useState(null);

      React.useEffect(() => {
        pedidoRepo.listar()
          .then(data => {
            const mapped = data.map(p => ({
              id: p.id, time: p.hora, client: p.cliente_nombre,
              items: p.lineas ? p.lineas.length : (p.items || 0),
              address: p.ciudad, amount: '$ ' + (p.monto || 0).toLocaleString('es-CO'),
              state: p.estado
            }));
            setOrders(mapped);
            if (mapped.length > 0) setSelected(mapped[0].id);
          })
          .finally(() => setLoading(false));
      }, []);

      const handleConfirm = (d) => setDraft(d);
      const finalize = async () => {
        const lineas = draft.lines.map(l => ({
          producto_sku: l.sku, nombre: l.name, cantidad: l.qty, precio_unitario: l.price
        }));
        const result = await pedidoRepo.crear({
          cliente_nombre: draft.client.name,
          ciudad: draft.client.city,
          direccion: draft.client.addr,
          telefono: draft.phone,
          lineas
        });
        const newOrder = {
          id: result.id, time: result.hora, client: result.cliente_nombre,
          items: result.lineas.length, address: result.ciudad,
          amount: '$ ' + result.monto.toLocaleString('es-CO'), state: result.estado
        };
        setOrders([newOrder, ...orders]);
        setSelected(result.id);
        setDraft(null);
        setToast({ message: 'Pedido confirmado', orderId: result.id });
        setTimeout(() => setToast(null), 3500);
      };

      return (
        <div className="app">
          <Sidebar active="pedidos" />
          <div className="main">
            <TopBar title="Pedidos · hoy" lastSync="hace 12 segundos" />
            <div className="workspace">
              <OrderListPanel
                orders={orders}
                selectedId={selected}
                onSelect={setSelected}
                query={query} setQuery={setQuery}
                filter={filter} setFilter={setFilter}
              />
              <NewOrderForm onConfirm={handleConfirm} />
            </div>
          </div>
          <ConfirmModal draft={draft} onCancel={() => setDraft(null)} onConfirm={finalize} />
          {toast && <Toast message={toast.message} orderId={toast.orderId} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
