<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>LácteoOp · Operación</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="operacion.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>html, body, #root { height: 100%; margin: 0; }</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../shared/domain.js"></script>
  <script type="text/babel" src="../shared/adapters/http.js"></script>
  <script type="text/babel" src="OperacionComponents.jsx"></script>

  <script type="text/babel">
    const API_URL = 'http://localhost:8000';
    const opRepo = LacteoOp.adapters.http.OperacionPort(API_URL);
    const condRepo = LacteoOp.adapters.http.ConductorPort(API_URL);

    function App() {
      const [range, setRange]           = React.useState('today');
      const [sort, setSort]             = React.useState('time');
      const [loading, setLoading]       = React.useState(true);
      const [lastRefresh, setLastRefresh] = React.useState('cargando…');
      const [kpis, setKpis]             = React.useState({});
      const [orders, setOrders]         = React.useState([]);
      const [drivers, setDrivers]       = React.useState([]);
      const [alerts, setAlerts]         = React.useState([]);
      const [barData, setBarData]       = React.useState([]);

      React.useEffect(() => {
        const load = async () => {
          try {
            const [kpisData, ordersData, driversData, alertsData, graficoData] = await Promise.all([
              opRepo.obtenerKpis(),
              opRepo.obtenerPedidos(),
              opRepo.obtenerConductores(),
              opRepo.obtenerAlertas(),
              opRepo.obtenerGrafico(),
            ]);
            setKpis(kpisData);
            setOrders(ordersData.map(o => ({
              id: o.id, time: o.hora, client: o.cliente_nombre, city: o.ciudad,
              state: o.estado, amount: '$ ' + (o.monto || 0).toLocaleString('es-CO'),
              amountValue: o.monto, driver: o.conductor || null
            })));
            setDrivers(driversData.map(d => ({
              name: d.nombre, initials: d.iniciales, zone: d.zona,
              done: d.paradas_hechas, total: d.total_paradas
            })));
            setAlerts(alertsData.map(a => ({
              kind: a.tipo, title: a.titulo, sub: a.subtitulo, when: a.timestamp
            })));
            setBarData(graficoData.map(g => ({
              label: g.label, d: g.entregados, r: g.devueltos, p: g.pendientes
            })));
            setLastRefresh('justo ahora');
          } catch (e) {
            setLastRefresh('error al cargar');
          } finally {
            setLoading(false);
          }
        };
        load();
        const interval = setInterval(load, 30000);
        return () => clearInterval(interval);
      }, []);

      const handleRefresh = () => setLastRefresh('justo ahora');

      return (
        <div className="op-app">
          <OpSidebar />
          <div className="op-main">
            <OpTopBar
              lastRefresh={lastRefresh}
              autoRefreshOn={true}
              range={range} onRange={setRange}
              onRefresh={handleRefresh}
            />
            <div className="op-content">
              <div className="kpi-grid">
                <KpiCard label="Pedidos hoy"  value={String(kpis.pedidos_hoy ?? '—')} deltaLabel="↑ 12 vs ayer"  deltaDir="up"   lastRefresh={lastRefresh} />
                <KpiCard label="En ruta"      value={String(kpis.en_ruta ?? '—')}     deltaLabel="de 6 conductores"               lastRefresh={lastRefresh} />
                <KpiCard label="Devoluciones" value={String(kpis.devoluciones ?? '—')} deltaLabel="↑ 2 vs ayer"  deltaDir="down"  lastRefresh={lastRefresh} alarm />
                <KpiCard label="Cartera"      value={kpis.cartera != null ? '$ ' + kpis.cartera.toLocaleString('es-CO') : '—'} deltaLabel="12 clientes vencidos"        lastRefresh={lastRefresh} />
              </div>

              <div className="panel">
                <div className="panel-head">
                  <h3>Pedidos por día</h3>
                  <span className="sub">últimos 7 días</span>
                  <div className="legend">
                    <span><span className="legend-swatch" style={{background:'var(--brand)'}}></span>Entregados</span>
                    <span><span className="legend-swatch" style={{background:'var(--paper-300)'}}></span>En curso</span>
                    <span><span className="legend-swatch" style={{background:'var(--red-300)'}}></span>Devoluciones</span>
                  </div>
                </div>
                <BarChart data={barData} max={150} />
              </div>

              <div className="dashboard-row">
                <div className="panel">
                  <div className="panel-head">
                    <h3>Pedidos de hoy</h3>
                    <span className="sub">{orders.length} resultados</span>
                  </div>
                  <OrdersTable orders={orders} sort={sort} onSort={setSort} />
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div className="panel">
                    <div className="panel-head">
                      <h3>Conductores en ruta</h3>
                      <span className="sub">{drivers.length} activos</span>
                    </div>
                    <DriversPanel drivers={drivers} />
                  </div>
                  <div className="panel">
                    <div className="panel-head">
                      <h3>Alertas</h3>
                      <span className="sub">{alerts.length} sin atender</span>
                    </div>
                    <AlertsPanel alerts={alerts} />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
