<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>LácteoOp · Ruta (Conductor)</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="ruta.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; height: 100%; background: var(--surface-page); }
    #root { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 32px 0; }
    .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .toggle-bar {
      display: flex; gap: 8px; padding: 8px;
      background: var(--surface-1); border: 1px solid var(--border-1); border-radius: var(--r-pill);
    }
    .toggle-bar button {
      height: 36px; padding: 0 14px; border-radius: 999px;
      background: transparent; border: none; cursor: pointer;
      font: inherit; font-size: 13px; font-weight: 600; color: var(--fg-2);
    }
    .toggle-bar button.on { background: var(--ink-900); color: var(--paper-50); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../shared/domain.js"></script>
  <script type="text/babel" src="../shared/adapters/http.js"></script>
  <script type="text/babel" src="../shared/adapters/offline.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="RutaComponents.jsx"></script>

  <script type="text/babel">
    const API_URL = 'http://localhost:8000';
    const httpParadaPort = LacteoOp.adapters.http.ParadaPort(API_URL);
    const httpConductorPort = LacteoOp.adapters.http.ConductorPort(API_URL);
    const offlineParadaPort = LacteoOp.adapters.offline.ParadaPort(httpParadaPort);

    const mapParadas = (data) => data.map(p => ({
      id: p.id, num: p.numero, client: p.cliente, addr: p.direccion,
      items: p.items, amount: '$ ' + (p.monto || 0).toLocaleString('es-CO'),
      eta: p.eta,
      label: p.estado === 'done' ? 'entregado' : p.estado === 'active' ? 'próxima parada' : p.estado === 'problem' ? 'problema' : 'pendiente',
      status: p.estado, receivedBy: p.recibido_por
    }));

    function App() {
      const [stops, setStops]       = React.useState([]);
      const [offline, setOffline]   = React.useState(false);
      const [offSheet, setOffSheet] = React.useState(false);
      const [confirm, setConfirm]   = React.useState(null);
      const [synced, setSynced]     = React.useState(false);

      const loadStops = () => {
        offlineParadaPort.listar()
          .then(data => setStops(mapParadas(data)))
          .catch(() => {});
      };

      React.useEffect(() => {
        loadStops();
      }, []);

      React.useEffect(() => {
        if (!offline) {
          offlineParadaPort.sincronizar()
            .then(results => {
              if (results && results.length > 0) {
                setStops(mapParadas(results));
                setSynced(true);
                setTimeout(() => setSynced(false), 3000);
              } else {
                loadStops();
              }
            })
            .catch(() => {});
        }
      }, [offline]);

      const onDeliver = (stop) => setConfirm(stop);
      const finalize = async () => {
        const result = await offlineParadaPort.marcarEntrega(confirm.id, 'Cliente');
        if (result) {
          setStops(prev => {
            const updated = prev.map(s => s.id === confirm.id
              ? { ...s, status: 'done', label: 'entregado', receivedBy: 'Cliente' }
              : s);
            let foundDone = false;
            return updated.map(s => {
              if (s.id === confirm.id) { foundDone = true; return s; }
              if (foundDone && s.status === 'pending') { foundDone = false; return { ...s, status: 'active', label: 'próxima parada' }; }
              return s;
            });
          });
        }
        setConfirm(null);
      };

      const stopsDone = stops.filter(s => s.status === 'done').length;
      const nextActive = stops.find(s => s.status === 'active');
      const routeStatus = { kind: 'ok', label: 'Estado de la ruta', value: 'Lista · generada 06:48' };

      return (
        <div className="stage">
          <IOSDevice width={392} height={820}>
            <div className="ruta-app">
              <RouteHeader driverName="Carlos Muñoz" routeStatus={routeStatus} stopsTotal={stops.length} stopsDone={stopsDone} />
              {offline && <OfflineBanner onClick={() => setOffSheet(true)} />}
              {synced && <div style={{ background: 'var(--green-100)', color: 'var(--green-700)', padding: '8px 16px', fontSize: 13, textAlign: 'center' }}>Sincronizado con el servidor</div>}
              <div className="stops">
                {stops.map(s => (
                  <StopCard key={s.num} stop={s} onDeliver={onDeliver} onReport={() => {}} />
                ))}
              </div>
              <BottomAction nextStop={nextActive} onNavigate={() => {}} />
              {offSheet && <OfflineSheet onClose={() => setOffSheet(false)} />}
              <ConfirmSheet stop={confirm} onCancel={() => setConfirm(null)} onConfirm={finalize} />
            </div>
          </IOSDevice>

          <div className="toggle-bar">
            <span style={{ alignSelf: 'center', fontSize: 12, color: 'var(--fg-3)', padding: '0 8px', fontFamily: 'var(--font-mono)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Conexión</span>
            <button className={!offline ? 'on' : ''} onClick={() => setOffline(false)}>En línea</button>
            <button className={offline ? 'on' : ''}  onClick={() => setOffline(true)}>Sin conexión</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
