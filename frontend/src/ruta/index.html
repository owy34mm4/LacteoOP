<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>LácteoOp · Ruta (Conductor)</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="ruta.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; height: 100%; background: var(--surface-page); }
    #root { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 32px 0; }
    .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .toggle-bar {
      display: flex; gap: 8px; padding: 8px;
      background: var(--surface-1); border: 1px solid var(--border-1); border-radius: var(--r-pill);
    }
    .toggle-bar button {
      height: 36px; padding: 0 14px; border-radius: 999px;
      background: transparent; border: none; cursor: pointer;
      font: inherit; font-size: 13px; font-weight: 600; color: var(--fg-2);
    }
    .toggle-bar button.on { background: var(--ink-900); color: var(--paper-50); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="RutaComponents.jsx"></script>

  <script type="text/babel">
    const INITIAL_STOPS = [
      { num: 1, client: 'Minimarket Yumbo Centro',  addr: 'Yumbo · Calle 5 #3-22',         items: 5,  amount: '$ 98.700',  eta: '10:42', label: 'entregado', status: 'done',    receivedBy: 'María González' },
      { num: 2, client: 'Café Los Almendros',       addr: 'Cali · Av 6N #28-04',           items: 3,  amount: '$ 54.200',  eta: '11:02', label: 'entregado', status: 'done',    receivedBy: 'Don Jorge' },
      { num: 3, client: 'Tienda La Esquina',        addr: 'Palmira · Cra 28 #14-12',       items: 8,  amount: '$ 248.500', eta: '11:20', label: 'próxima parada', status: 'active' },
      { num: 4, client: 'Restaurante El Buen Sabor',addr: 'Cali · Av 6N #28-04',           items: 12, amount: '$ 412.000', eta: '12:05', label: 'pendiente', status: 'pending' },
      { num: 5, client: 'Panadería Doña Rosa',      addr: 'Palmira · Cra 31 #20-15',       items: 6,  amount: '$ 142.500', eta: '12:40', label: 'pendiente', status: 'pending' },
      { num: 6, client: 'Tienda Don Pacho',         addr: 'Cali · Calle 70 #5-12',         items: 4,  amount: '$ 86.200',  eta: '13:15', label: 'pendiente', status: 'pending' },
    ];

    function App() {
      const [stops, setStops] = React.useState(INITIAL_STOPS);
      const [offline, setOffline]   = React.useState(false);
      const [offSheet, setOffSheet] = React.useState(false);
      const [confirm, setConfirm]   = React.useState(null);

      const onDeliver = (stop) => setConfirm(stop);
      const finalize = () => {
        setStops(stops.map(s => {
          if (s.num === confirm.num) {
            return { ...s, status: 'done', label: 'entregado', receivedBy: 'Cliente' };
          }
          if (s.status === 'pending' && stops.find(x => x.num === confirm.num)?.num + 1 === s.num) {
            return { ...s, status: 'active', label: 'próxima parada' };
          }
          return s;
        }));
        setConfirm(null);
      };

      const stopsDone = stops.filter(s => s.status === 'done').length;
      const nextActive = stops.find(s => s.status === 'active');
      const routeStatus = { kind: 'ok', label: 'Estado de la ruta', value: 'Lista · generada 06:48' };

      return (
        <div className="stage">
          <IOSDevice width={392} height={820}>
            <div className="ruta-app">
              <RouteHeader driverName="Carlos Muñoz" routeStatus={routeStatus} stopsTotal={stops.length} stopsDone={stopsDone} />
              {offline && <OfflineBanner onClick={() => setOffSheet(true)} />}
              <div className="stops">
                {stops.map(s => (
                  <StopCard key={s.num} stop={s} onDeliver={onDeliver} onReport={() => {}} />
                ))}
              </div>
              <BottomAction nextStop={nextActive} onNavigate={() => {}} />
              {offSheet && <OfflineSheet onClose={() => setOffSheet(false)} />}
              <ConfirmSheet stop={confirm} onCancel={() => setConfirm(null)} onConfirm={finalize} />
            </div>
          </IOSDevice>

          <div className="toggle-bar">
            <span style={{ alignSelf: 'center', fontSize: 12, color: 'var(--fg-3)', padding: '0 8px', fontFamily: 'var(--font-mono)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Conexión</span>
            <button className={!offline ? 'on' : ''} onClick={() => setOffline(false)}>En línea</button>
            <button className={offline ? 'on' : ''}  onClick={() => setOffline(true)}>Sin conexión</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
