name: CI Tests

on:
  workflow_call:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URL: mongodb://localhost:27017
      MONGO_DB: lacteoop_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Create Python 3.14 environment
        working-directory: backend
        run: uv venv --python 3.14

      - name: Install dependencies
        working-directory: backend
        run: uv pip install -r src/requirements.txt -r requirements-dev.txt

      - name: Run tests (unit + integration)
        working-directory: backend
        run: uv run pytest -q

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test
