name: Build (reusable)

# Reusable image build. With push=false it only BUILDS (PR validation, no creds needed);
# with push=true it logs in, derives tags and PUSHES to DockerHub (deploy).
on:
  workflow_call:
    inputs:
      backend_dockerfile:
        type: string
        default: ./backend/Dockerfile
      frontend_dockerfile:
        type: string
        default: ./frontend/Dockerfile
      push:
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            image: lacteoop-backend
          - name: frontend
            context: ./frontend
            image: lacteoop-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        if: ${{ inputs.push }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push when enabled)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.name == 'backend' && inputs.backend_dockerfile || inputs.frontend_dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.push && steps.meta.outputs.tags || format('lacteoop-{0}:pr', matrix.name) }}
          labels: ${{ inputs.push && steps.meta.outputs.labels || '' }}
